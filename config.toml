[model]
# Provider must be one of: anthropic, openai, google, mlx

provider = "google"

# Model name is optional — omit to use each provider's default

#name =  "nightmedia/UI-Venus-1.5-30B-A3B-mxfp4-mlx"
name ="gemini-3.1-flash-image-preview"
# api_key is optional — omit to read from the environment variable
# api_key = "sk-..."

[evaluation]
# Directory produced by generate_composites.py (must contain validation.json)

composite_dir = "output/png_10_45_spiral_target5"

# Optional: name of the target object (must match a key in validation.json).
# When set, a "target" score is added to every record in score.json.
# target = "elephant"

# Base prompt sent to the model along with each composite image.
# The object names and an example JSON format are appended automatically
# from validation.json — do not hardcode item names here.
prompt = """
Look at this image carefully and count every distinct object type you can see.

Return ONLY a valid JSON object — no explanation, no markdown — where each key
is the object name (lowercase) and each value is the integer count of that
object in the image.
"""

[output]
# Where to write results. Relative paths are resolved inside composite_dir.
# Omit to use the default: <composite_dir>/score.json
# score_file = "score.json"
